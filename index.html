<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>徐工汉云 · 全媒体舆情监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f7;color:#1a1a2e;font-size:13px;line-height:1.5;min-height:100vh}
.hd{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 55%,#1565c0 100%);color:#fff;padding:13px 18px 11px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
.hd-left h1{font-size:17px;font-weight:700;letter-spacing:.4px}
.hd-left p{font-size:11px;opacity:.7;margin-top:1px}
.hd-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.hd-date{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:3px 10px;font-size:12px}
.btn-hd{color:#fff;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.3);transition:background .15s}
.btn-refresh{background:rgba(255,255,255,.2)}.btn-refresh:hover{background:rgba(255,255,255,.32)}
.btn-manual{background:rgba(255,165,0,.35);border-color:rgba(255,165,0,.6)}.btn-manual:hover{background:rgba(255,165,0,.55)}
.btn-report{background:rgba(99,102,241,.45);border-color:rgba(99,102,241,.7)}.btn-report:hover{background:rgba(99,102,241,.65)}
.period-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 18px;display:flex;align-items:center;position:sticky;top:56px;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.period-tab{padding:10px 20px;font-size:13px;font-weight:500;color:#6b7280;border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.period-tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8}
.period-sep{flex:1}
.period-nav{display:flex;align-items:center;gap:6px;padding:4px 0}
.nav-arrow{width:26px;height:26px;border:1px solid #d1d5db;border-radius:5px;background:#fff;cursor:pointer;font-size:14px;color:#374151;display:flex;align-items:center;justify-content:center}
.nav-arrow:hover{background:#f1f5f9}
.nav-label-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#374151;min-width:160px;padding:4px 10px;background:#f8faff;border:1px solid #bfdbfe;border-radius:6px;cursor:pointer;font-family:inherit;user-select:none}
.nav-label-btn:hover{background:#eff6ff}
.nav-label-btn .label-text{flex:1;text-align:center}
.nav-label-btn .drop-arrow{font-size:10px;color:#6b7280}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.show{display:flex}
.popup{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.22);max-width:480px;width:92vw;overflow:hidden}
.popup-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.popup-hdr h3{font-size:15px;font-weight:700;color:#1e3a5f}
.popup-close{width:28px;height:28px;border:none;background:#f3f4f6;border-radius:50%;cursor:pointer;font-size:16px;color:#6b7280;display:flex;align-items:center;justify-content:center;line-height:1}
.popup-close:hover{background:#e5e7eb}
.popup-body{padding:16px 20px 20px}
.btn-cancel{padding:7px 16px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#374151;cursor:pointer;font-size:12px;font-family:inherit}
.btn-cancel:hover{background:#f9fafb}
.btn-submit{padding:7px 16px;background:#1d4ed8;border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:12px;font-family:inherit}
.btn-submit:hover{background:#1e40af}
.btn-submit:disabled{opacity:.5;cursor:default}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.mode-card{border:2px solid #e5e7eb;border-radius:10px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .15s}
.mode-card:hover{border-color:#1d4ed8;background:#f0f6ff;transform:translateY(-2px)}
.mode-card .mc-icon{font-size:32px;margin-bottom:8px}
.mode-card .mc-title{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:4px}
.mode-card .mc-desc{font-size:11px;color:#6b7280;line-height:1.5}
#urlTextarea{width:100%;height:150px;border:1px solid #d1d5db;border-radius:8px;padding:10px;font-size:12px;font-family:inherit;resize:vertical;outline:none}
#urlTextarea:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.status-center{padding:28px 24px;text-align:center}
.s-icon{font-size:44px;margin-bottom:12px;line-height:1}
.s-title{font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:8px}
.s-body{font-size:12px;color:#6b7280;line-height:1.75;margin-bottom:16px}
.diff-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 14px;margin-bottom:14px;text-align:left;font-size:12px;color:#15803d;line-height:1.8;display:none}
.diff-box.stale{background:#fefce8;border-color:#fde047;color:#92400e}
.s-actions{display:flex;gap:8px;justify-content:center}
#calPickerOverlay{display:none;position:fixed;inset:0;z-index:1000}
#calPickerOverlay.show{display:block}
#calPickerPopup{position:absolute;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:14px;width:300px;z-index:1001}
.cp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cp-month-label{font-size:14px;font-weight:700;color:#1e3a5f}
.cp-nav{width:28px;height:28px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;font-size:14px;color:#374151;display:flex;align-items:center;justify-content:center}
.cp-nav:hover{background:#f1f5f9}
.cp-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cp-dow{text-align:center;font-size:10px;font-weight:600;color:#9ca3af;padding:3px 0}
.cp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cp-cell{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:2px;border:1px solid transparent}
.cp-cell:hover:not(.cp-empty):not(.cp-future){background:#eff6ff;border-color:#bfdbfe}
.cp-cell.cp-empty,.cp-cell.cp-future{cursor:default}
.cp-cell.cp-future{opacity:.4}
.cp-cell.cp-today{border-color:#3b82f6!important;background:#eff6ff}
.cp-cell.cp-selected{background:#1d4ed8!important;border-color:#1d4ed8!important}
.cp-cell.cp-selected .cp-day-num{color:#fff!important}
.cp-cell.cp-has-data{background:#f0fdf4;border-color:#86efac}
.cp-cell.cp-has-neg{background:#fff5f5;border-color:#fca5a5}
.cp-cell.cp-monthly{background:#fefce8;border-color:#fde047}
.cp-cell.cp-monthly.cp-has-neg{background:#fff5f5;border-color:#fca5a5}
.cp-day-num{font-size:11px;font-weight:600;color:#374151;line-height:1}
.cp-cell.cp-today .cp-day-num{color:#1d4ed8}
.cp-cell.cp-has-neg .cp-day-num{color:#b91c1c}
.cp-cell.cp-monthly .cp-day-num{color:#92400e}
.cp-dots{display:flex;gap:2px;margin-top:1px}
.cp-dot{width:4px;height:4px;border-radius:50%}
.cp-dot.pos{background:#16a34a}.cp-dot.neu{background:#9ca3af}.cp-dot.neg{background:#dc2626}
.cp-count{font-size:9px;color:#6b7280;line-height:1}
.cp-cell.cp-selected .cp-count{color:rgba(255,255,255,.8)}
.cp-legend{display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid #f1f5f9;flex-wrap:wrap;justify-content:center}
.cp-legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#6b7280}
.cp-legend-swatch{width:10px;height:10px;border-radius:2px;border:1px solid}
.cp-legend-swatch.has-data{background:#f0fdf4;border-color:#86efac}
.cp-legend-swatch.has-neg{background:#fff5f5;border-color:#fca5a5}
.cp-legend-swatch.monthly{background:#fefce8;border-color:#fde047}
#monthReportOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;align-items:center;justify-content:center}
#monthReportOverlay.show{display:flex}
.report-shell{background:#fff;width:min(820px,96vw);max-height:92vh;border-radius:14px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.report-toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;background:#f8faff}
.report-toolbar-title{font-size:14px;font-weight:700;color:#1e3a5f}
.report-toolbar-actions{display:flex;gap:8px}
#reportContent{overflow-y:auto;flex:1;padding:32px 40px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a2e;color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.page{padding:14px 16px;max-width:1100px;margin:0 auto}
.neg-banner{display:none;background:#fff5f5;border:1px solid #feb2b2;border-left:4px solid #e53e3e;border-radius:8px;padding:10px 14px;margin-bottom:12px}
.neg-banner.show{display:block}
.neg-banner-title{font-weight:700;color:#c53030;font-size:12px;margin-bottom:6px}
.neg-banner-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.neg-banner-list li{font-size:12px}
.neg-banner-list a{color:#c53030;text-decoration:underline;word-break:break-all}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.stat-c{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat-lbl{font-size:11px;color:#9ca3af;margin-bottom:3px}
.stat-val{font-size:24px;font-weight:700}
.c-blue{color:#1d4ed8}.c-green{color:#16a34a}.c-gray{color:#6b7280}.c-red{color:#dc2626}.c-amber{color:#d97706}
.stat-sub{font-size:10px;color:#d1d5db;margin-top:2px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.chart-c{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.chart-ttl{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px}
.chart-wrap{position:relative;height:150px}
.cal-wrap{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:#6b7280;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{min-height:56px;border-radius:8px;padding:5px 6px;border:1px solid #e5e7eb;background:#fafafa;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:2px}
.cal-cell:hover{border-color:#93c5fd;background:#eff6ff}
.cal-cell.today{border-color:#3b82f6;background:#eff6ff}
.cal-cell.selected{border-color:#1d4ed8;background:#dbeafe;box-shadow:0 0 0 2px rgba(29,78,216,.2)}
.cal-cell.empty,.cal-cell.no-data{background:#f9fafb;cursor:default;opacity:.5}
.cal-cell.monthly-data{background:#fefce8;border-color:#fde047}
.cal-day-num{font-size:12px;font-weight:600;color:#374151}
.cal-cell.today .cal-day-num{color:#1d4ed8}
.cal-count{font-size:11px;font-weight:700;color:#1d4ed8}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.pos{background:#16a34a}.cal-dot.neu{background:#9ca3af}.cal-dot.neg{background:#dc2626}
.week-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.week-cell{flex:1;min-width:90px;border-radius:8px;padding:8px 10px;border:1px solid #e5e7eb;background:#fafafa;cursor:pointer;transition:border-color .15s,background .15s;text-align:center}
.week-cell:hover{border-color:#93c5fd;background:#eff6ff}
.week-cell.today{border-color:#3b82f6;background:#eff6ff}
.week-cell.selected{border-color:#1d4ed8;background:#dbeafe}
.week-cell.no-data{opacity:.5;cursor:default}
.wc-dow{font-size:11px;color:#6b7280;margin-bottom:2px}
.wc-date{font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.wc-count{font-size:18px;font-weight:700;color:#1d4ed8}
.wc-dots{display:flex;justify-content:center;gap:3px;margin-top:3px}
.summary-c{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.summary-ttl{font-size:12px;font-weight:600;color:#374151;margin-bottom:7px}
.summary-body{font-size:12px;color:#4b5563;line-height:1.75}
.filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding:8px 12px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.f-lbl{font-size:11px;color:#6b7280;white-space:nowrap}
.f-group{display:flex;gap:4px;flex-wrap:wrap}
.f-btn{padding:3px 10px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:11px;color:#374151;cursor:pointer;font-family:inherit}
.f-btn:hover{border-color:#6366f1;color:#6366f1}
.f-btn.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.f-sep{width:1px;height:18px;background:#e5e7eb;flex-shrink:0}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.list-ttl{font-size:12px;font-weight:600;color:#374151}
.list-cnt{font-size:11px;color:#9ca3af}
.items{display:flex;flex-direction:column;gap:7px}
.item{background:#fff;border-radius:9px;padding:11px 13px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:3px solid #e5e7eb}
.item:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.item.pos{border-left-color:#16a34a}.item.neu{border-left-color:#9ca3af}.item.neg{border-left-color:#dc2626;background:#fffafa}
.item-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.item-title{font-size:13px;font-weight:600;color:#1d4ed8;text-decoration:none;flex:1;line-height:1.4;word-break:break-all}
.item-title:hover{text-decoration:underline}
.item-title.no-link{color:#374151;cursor:default}
.badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;align-items:flex-start}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;line-height:1.4}
.b-platform{color:#fff}.b-sent-pos{background:#dcfce7;color:#15803d}.b-sent-neu{background:#f3f4f6;color:#4b5563}.b-sent-neg{background:#fee2e2;color:#b91c1c}.b-type{background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}
.item-meta{font-size:11px;color:#9ca3af;margin-bottom:4px}
.item-summary{font-size:12px;color:#4b5563;line-height:1.65}
.item-topics{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.topic{background:#f1f5f9;color:#475569;padding:1px 7px;border-radius:10px;font-size:10px}
.item-link-row{margin-top:6px}
.item-link{font-size:11px;color:#1d4ed8;text-decoration:none;display:inline-flex;align-items:center;gap:3px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:2px 8px}
.item-link:hover{background:#dbeafe}
.loader,.empty{text-align:center;padding:36px;color:#9ca3af;background:#fff;border-radius:10px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#1d4ed8;border-radius:50%;animation:sp .7s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.monthly-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#fefce8;border:1px solid #fde047;border-radius:12px;font-size:11px;color:#92400e;margin-bottom:10px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <h1>📡 徐工汉云 · 全媒体舆情监控</h1>
    <p>央媒 · 科技媒体 · 财经媒体 · 社交平台 · 自媒体 · 国际媒体</p>
  </div>
  <div class="hd-right">
    <div class="hd-date" id="hdDate">—</div>
    <span id="genAt" style="font-size:11px;color:rgba(255,255,255,.5);margin-right:4px">更新于 2026-06-16 09:22</span>
    <button class="btn-hd btn-report" onclick="showMonthReportModal()">📊 月报</button>
    <button class="btn-hd btn-refresh" onclick="init()">↻ 刷新</button>
  </div>
</div>

<div class="period-bar">
  <button class="period-tab active" onclick="setPeriod('day')" id="tab-day">日报</button>
  <button class="period-tab" onclick="setPeriod('week')" id="tab-week">周报</button>
  <button class="period-tab" onclick="setPeriod('month')" id="tab-month">月报</button>
  <div class="period-sep"></div>
  <div class="period-nav">
    <button class="nav-arrow" onclick="navPrev()">&#8249;</button>
    <button class="nav-label-btn" id="navLabelBtn" onclick="toggleCalPicker(event)">
      <span>📅</span><span class="label-text" id="navLabelText">—</span><span class="drop-arrow">▼</span>
    </button>
    <button class="nav-arrow" onclick="navNext()">&#8250;</button>
  </div>
</div>

<div id="calPickerOverlay" onclick="hideCalPicker()">
  <div id="calPickerPopup" onclick="event.stopPropagation()">
    <div class="cp-header">
      <button class="cp-nav" onclick="cpNavMonth(-1)">&#8249;</button>
      <div class="cp-month-label" id="cpMonthLabel">—</div>
      <button class="cp-nav" onclick="cpNavMonth(1)">&#8250;</button>
    </div>
    <div class="cp-dow-row">
      <div class="cp-dow">一</div><div class="cp-dow">二</div><div class="cp-dow">三</div>
      <div class="cp-dow">四</div><div class="cp-dow">五</div><div class="cp-dow">六</div><div class="cp-dow">日</div>
    </div>
    <div class="cp-grid" id="cpGrid"></div>
    <div class="cp-legend">
      <div class="cp-legend-item"><div class="cp-legend-swatch has-data"></div>日数据</div>
      <div class="cp-legend-item"><div class="cp-legend-swatch has-neg"></div>含负面</div>
      <div class="cp-legend-item"><div class="cp-legend-swatch monthly"></div>月度汇总</div>
    </div>
  </div>
</div>




<div id="monthReportOverlay" onclick="hideModal('monthReportOverlay')">
  <div class="report-shell" onclick="event.stopPropagation()">
    <div class="report-toolbar">
      <span class="report-toolbar-title" id="reportTitle">📊 舆情月报</span>
      <div class="report-toolbar-actions">
        <button class="btn-submit" onclick="exportReportHtml()">⬇️ 导出 HTML → PDF</button>
        <button class="btn-cancel" onclick="hideModal('monthReportOverlay')">关闭</button>
      </div>
    </div>
    <div id="reportContent"></div>
  </div>
</div>

<div id="toast"></div>

<div class="page" id="page">
  <div class="loader"><div class="spin"></div><br>正在初始化数据…</div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var pg = document.getElementById('page');
  if (pg && pg.querySelector('.spin')) {
    pg.innerHTML = '<div class="empty">❌ 脚本错误：' + msg + '<br><small>' + src + ':' + line + '</small><br><br><button onclick="location.reload()" style="padding:6px 14px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;cursor:pointer">↻ 重新加载</button></div>';

  for (var i = 0; i < keys.length; i++) { if (tag.indexOf(keys[i]) >= 0) return PLAT_COLORS[keys[i]]; }
  return '#6b7280';
}

var allFiles   = [];
var period     = 'day';
var cursor     = '';
var typeFilter = 'all';
var sentFilter = 'all';
var charts     = {};
var cpYear     = 0;
var cpMonth    = 0;
var prevSnap   = {};

function fileKey(pd) {
  if (!pd) return null;
  var d = pd.slice(0, 10);
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
  return d >= CUTOFF ? d : pd.slice(0, 7);
}
function findEntry(dateStr) {
  if (!dateStr) return null;
  var e = allFiles.filter(function(f){ return f.date === dateStr; })[0];
  if (e) return e;
  if (dateStr.length === 10 && dateStr < CUTOFF) {
    e = allFiles.filter(function(f){ return f.date === dateStr.slice(0,7); })[0];
  }
  return e || null;
}
function fmtDate(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function offsetDate(str, n) {
  var d = new Date(str + 'T00:00:00'); d.setDate(d.getDate() + n); return fmtDate(d);
}
function weekStart(str) {
  var d = new Date(str + 'T00:00:00'); var dow = (d.getDay()+6)%7; d.setDate(d.getDate()-dow); return fmtDate(d);
}

function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
var _tt;
function showToast(msg, ms) {
  ms = ms || 3000;
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(function(){ t.classList.remove('show'); }, ms);
}

function init() {

    return;
  }
  render();
}

function toggleCalPicker(e) {
  e.stopPropagation();
  var ov = document.getElementById('calPickerOverlay');
  if (ov.classList.contains('show')) { hideCalPicker(); return; }
  var d = new Date(cursor+'T00:00:00'); cpYear = d.getFullYear(); cpMonth = d.getMonth();
  renderCalPickerMonth();
  ov.classList.add('show');
  var popup = document.getElementById('calPickerPopup');
  var rect  = document.getElementById('navLabelBtn').getBoundingClientRect();
  var left = rect.left; var top = rect.bottom+6;
  if (left+300>window.innerWidth-10) left=window.innerWidth-310;
  if (left<10) left=10;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
function hideCalPicker() { document.getElementById('calPickerOverlay').classList.remove('show'); }
function cpNavMonth(delta) {
  cpMonth+=delta;
  if(cpMonth<0){cpMonth=11;cpYear--;} if(cpMonth>11){cpMonth=0;cpYear++;}
  renderCalPickerMonth();
}
function renderCalPickerMonth() {
  var today = fmtDate(new Date());
  document.getElementById('cpMonthLabel').textContent = cpYear+'年'+(cpMonth+1)+'月';
  var firstDay = new Date(cpYear,cpMonth,1);
  var lastDay  = new Date(cpYear,cpMonth+1,0);
  var startDow = (firstDay.getDay()+6)%7;
  var daysInMon = lastDay.getDate();
  var dataMap = {};
  allFiles.forEach(function(f){ dataMap[f.date]=f.data; });
  var monthKey  = cpYear+'-'+pad(cpMonth+1);
  var monthData = dataMap[monthKey];
  var grid = document.getElementById('cpGrid'); grid.innerHTML='';
  for (var i=0;i<startDow;i++) { var e=document.createElement('div');e.className='cp-cell cp-empty';grid.appendChild(e); }
  for (var day=1;day<=daysInMon;day++) {
    var dateStr = cpYear+'-'+pad(cpMonth+1)+'-'+pad(day);
    var isFuture=dateStr>today, isToday=dateStr===today, isSel=dateStr===cursor;
    var dayData  = dataMap[dateStr];
    var effData  = dayData || (dateStr<CUTOFF ? monthData : null);
    var isMonthly = !dayData && !!monthData && dateStr<CUTOFF;
    var cnt = effData ? (effData.items||[]).length : 0;
    var sd  = (effData && effData.summary && effData.summary.sentiment_distribution) || {};
    var hasNeg = (sd['负面']||0)>0, hasData = cnt>0;
    var cls = 'cp-cell';
    if(isSel) cls+=' cp-selected'; else if(isToday) cls+=' cp-today';
    if(isFuture) cls+=' cp-future';
    else if(isMonthly&&hasNeg) cls+=' cp-monthly cp-has-neg';
    else if(isMonthly) cls+=' cp-monthly';
    else if(hasNeg) cls+=' cp-has-neg';
    else if(hasData) cls+=' cp-has-data';
    var cell=document.createElement('div'); cell.className=cls;
    var inner='<div class="cp-day-num">'+day+'</div>';
    if(hasData&&!isFuture){
      inner+='<div class="cp-count">'+(isMonthly?'月':cnt)+'</div>';
      inner+='<div class="cp-dots">';
      if((sd['正面']||0)>0) inner+='<span class="cp-dot pos"></span>';
      if((sd['中性']||0)>0) inner+='<span class="cp-dot neu"></span>';
      if((sd['负面']||0)>0) inner+='<span class="cp-dot neg"></span>';
      inner+='</div>';
    }
    cell.innerHTML=inner;
    if(!isFuture){
      cell.title = hasData ? dateStr+(isMonthly?'（月度）':'')+' — '+cnt+'条' : dateStr+' — 暂无';
      (function(ds){
        cell.onclick=function(){
          cursor=ds; period='day';
          document.querySelectorAll('.period-tab').forEach(function(t){t.classList.remove('active');});
          document.getElementById('tab-day').classList.add('active');
          typeFilter='all'; sentFilter='all'; hideCalPicker(); render();
        };
      })(dateStr);
    }
    grid.appendChild(cell);
  }
}

function updateNavLabel() {
  var el=document.getElementById('navLabelText'); if(!el)return;
  if(period==='day'){
    var entry=findEntry(cursor); var key=entry?entry.date:cursor;
    el.textContent=key.length===7?key.slice(0,4)+'年'+parseInt(key.slice(5))+'月（月度）':cursor;
  } else if(period==='week'){
    var ws=weekStart(cursor); el.textContent=ws.slice(5)+' ~ '+offsetDate(ws,6).slice(5);
  } else {
    var d=new Date(cursor+'T00:00:00'); el.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
  }
  document.getElementById('hdDate').textContent=cursor;
}
function setPeriod(p){
  period=p;
  document.querySelectorAll('.period-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-'+p).classList.add('active');
  typeFilter='all'; sentFilter='all'; render();
}
function navPrev(){
  if(period==='day'){
    var entry=findEntry(cursor);
    if(entry&&entry.date.length===7){var d=new Date(cursor+'T00:00:00');d.setMonth(d.getMonth()-1);cursor=fmtDate(new Date(d.getFullYear(),d.getMonth(),1));}
    else cursor=offsetDate(cursor,-1);
  } else if(period==='week') cursor=offsetDate(weekStart(cursor),-7);
  else{var d=new Date(cursor+'T00:00:00');d.setMonth(d.getMonth()-1);cursor=fmtDate(new Date(d.getFullYear(),d.getMonth(),1));}
  render();
}
function navNext(){
  if(period==='day'){
    var entry=findEntry(cursor);
    if(entry&&entry.date.length===7){var d=new Date(cursor+'T00:00:00');d.setMonth(d.getMonth()+1);cursor=fmtDate(new Date(d.getFullYear(),d.getMonth(),1));}
    else cursor=offsetDate(cursor,1);
  } else if(period==='week') cursor=offsetDate(weekStart(cursor),7);
  else{var d=new Date(cursor+'T00:00:00');d.setMonth(d.getMonth()+1);cursor=fmtDate(new Date(d.getFullYear(),d.getMonth(),1));}

}
function selectDay(dateStr){
  cursor=dateStr; period='day';

  document.getElementById('tab-day').classList.add('active');
  typeFilter='all'; sentFilter='all'; render();
}

function render(){
  destroyCharts(); updateNavLabel();
  if(period==='day') renderDay();
  else if(period==='week') renderWeek();
  else renderMonth();
}

function renderDay(){
  var entry=findEntry(cursor);
  var items=entry?(entry.data.items||[]):[];
  var summ=entry?(entry.data.summary||{}):{};
  var isMonthly=entry&&entry.date.length===7;
  var label=isMonthly?entry.date.slice(0,4)+'年'+parseInt(entry.date.slice(5))+'月（月度）':cursor;
  var sorted=items.slice().sort(function(a,b){var o={'负面':0,'中性':1,'正面':2};return((o[a.sentiment]||3)-(o[b.sentiment]||3));});
  var pg='';
  if(isMonthly) pg+='<div class="monthly-badge">📅 月度汇总 · '+label+'</div>';
  pg+='<div id="negBanner" class="neg-banner"></div>';
  pg+='<div class="stats" id="statsRow"></div>';
  pg+='<div class="charts" id="chartsRow"><div class="chart-c"><div class="chart-ttl">📊 情感分布</div><div class="chart-wrap"><canvas id="cSent"></canvas></div></div><div class="chart-c"><div class="chart-ttl">📂 来源分布</div><div class="chart-wrap"><canvas id="cPlat"></canvas></div></div></div>';
  pg+='<div id="sumDesc"></div><div class="filters" id="filterBar"></div>';
  pg+='<div class="list-hdr"><span class="list-ttl">📋 舆情内容</span><span class="list-cnt" id="listCnt"></span></div><div id="itemsWrap"></div>';
  document.getElementById('page').innerHTML=pg;
  renderNegBanner(sorted); renderStats(summ,sorted,label);
  renderSentChart(summ); renderPlatChart(summ);
  renderSummaryDesc(summ.overall_description,'📝 整体舆情','sumDesc');
  renderFilters(); renderItems(sorted);
}

function renderWeek(){
  var ws=weekStart(cursor); var days=[];
  for(var i=0;i<7;i++) days.push(offsetDate(ws,i));
  var agg=aggregateDays(days); var today=fmtDate(new Date());
  var pg='<div id="negBanner" class="neg-banner"></div><div class="stats" id="statsRow"></div>';
  pg+='<div class="week-row" id="weekRow"></div>';
  pg+='<div class="charts" id="chartsRow"><div class="chart-c"><div class="chart-ttl">📊 本周情感</div><div class="chart-wrap"><canvas id="cSent"></canvas></div></div><div class="chart-c"><div class="chart-ttl">📈 每日趋势</div><div class="chart-wrap"><canvas id="cTrend"></canvas></div></div></div>';
  pg+='<div id="sumDesc"></div><div class="filters" id="filterBar"></div>';
  pg+='<div class="list-hdr"><span class="list-ttl">📋 本周全部舆情</span><span class="list-cnt" id="listCnt"></span></div><div id="itemsWrap"></div>';
  document.getElementById('page').innerHTML=pg;
  var DOW=['周一','周二','周三','周四','周五','周六','周日'];
  var wr=document.getElementById('weekRow');
  days.forEach(function(d,i){
    var entry=findEntry(d); var cnt=entry?(entry.data.items||[]).length:0;
    var cell=document.createElement('div');
    cell.className='week-cell'+(d===today?' today':'')+(cursor===d?' selected':'')+(entry?'':' no-data');
    cell.innerHTML='<div class="wc-dow">'+DOW[i]+'</div><div class="wc-date">'+d.slice(5)+'</div><div class="wc-count">'+(cnt||'—')+'</div>';
    if(entry)(function(ds){cell.onclick=function(){selectDay(ds);};})(d);
    wr.appendChild(cell);
  });
  renderNegBannerAgg(agg); renderStats(agg.summ,agg.items,ws+' – '+days[6]);
  renderSentChart(agg.summ); renderWeekTrendChart(days);
  renderSummaryDesc(autoWeeklySummary(agg,days),'📋 本周舆情总结','sumDesc');
  renderFilters(); renderItems(agg.items);
}

function renderMonth(){
  var base=new Date(cursor+'T00:00:00'), year=base.getFullYear(), mon=base.getMonth();
  var label=year+'年'+(mon+1)+'月';
  var firstDay=new Date(year,mon,1), lastDay=new Date(year,mon+1,0);
  var startDow=(firstDay.getDay()+6)%7;
  var monthDays=[]; for(var di=1;di<=lastDay.getDate();di++) monthDays.push(fmtDate(new Date(year,mon,di)));
  var agg=aggregateDays(monthDays); var today=fmtDate(new Date());
  var dataMap={}; allFiles.forEach(function(f){dataMap[f.date]=f.data;});
  var monthKey=year+'-'+pad(mon+1); var monthData=dataMap[monthKey];
  var pg='<div id="negBanner" class="neg-banner"></div><div class="stats" id="statsRow"></div>';
  pg+='<div class="charts" id="chartsRow"><div class="chart-c"><div class="chart-ttl">📊 本月情感</div><div class="chart-wrap"><canvas id="cSent"></canvas></div></div><div class="chart-c"><div class="chart-ttl">📈 每日趋势</div><div class="chart-wrap"><canvas id="cTrend"></canvas></div></div></div>';
  pg+='<div class="cal-wrap" id="calWrap"></div>';
  pg+='<div id="sumDesc"></div><div class="filters" id="filterBar"></div>';
  pg+='<div class="list-hdr"><span class="list-ttl">📋 本月全部舆情</span><span class="list-cnt" id="listCnt"></span></div><div id="itemsWrap"></div>';
  document.getElementById('page').innerHTML=pg;
  var DOW2=['一','二','三','四','五','六','日'];
  var cw=document.getElementById('calWrap');
  var ch='<div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">'+label+'</div>';
  ch+='<div class="cal-hdr">'+DOW2.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('')+'</div>';
  ch+='<div class="cal-grid" id="calGrid"></div>';
  cw.innerHTML=ch;
  var grid2=document.getElementById('calGrid');
  for(var ei=0;ei<startDow;ei++){var emp=document.createElement('div');emp.className='cal-cell empty';grid2.appendChild(emp);}
  monthDays.forEach(function(d){
    var dd=dataMap[d]; var effData=dd||(d<CUTOFF?monthData:null);
    var isMonthly=!dd&&!!monthData&&d<CUTOFF;
    var cnt=effData?(effData.items||[]).length:0;
    var s2=(effData&&effData.summary&&effData.summary.sentiment_distribution)||{};
    var cell2=document.createElement('div');
    cell2.className='cal-cell'+(d===today?' today':'')+(!cnt?' no-data':'')+(isMonthly?' monthly-data':'');
    var inn='<div class="cal-day-num">'+parseInt(d.slice(8))+'</div>';
    if(cnt){inn+='<div class="cal-count">'+(isMonthly?'月':cnt)+'</div><div class="cal-dots">';
      if((s2['正面']||0)>0)inn+='<span class="cal-dot pos"></span>';
      if((s2['中性']||0)>0)inn+='<span class="cal-dot neu"></span>';
      if((s2['负面']||0)>0)inn+='<span class="cal-dot neg"></span>';
      inn+='</div>';}
    cell2.innerHTML=inn;
    if(effData)(function(ds){cell2.onclick=function(){selectDay(ds);};})(d);
    grid2.appendChild(cell2);
  });
  renderNegBannerAgg(agg); renderStats(agg.summ,agg.items,label);
  renderSentChart(agg.summ); renderMonthTrendChart(monthDays,dataMap);
  renderSummaryDesc(autoMonthlySummary(agg,label),'📋 本月舆情总结','sumDesc');
  renderFilters(); renderItems(agg.items);
}

function aggregateDays(days){
  var seen={}; var items=[]; var pos=0,neu=0,neg=0; var byP={};
  days.forEach(function(d){
    var entry=findEntry(d);
    if(!entry||seen[entry.date])return;
    seen[entry.date]=1;
    (entry.data.items||[]).forEach(function(it){ items.push(Object.assign({},it,{_date:it.publish_date||d})); });
    var s=(entry.data.summary&&entry.data.summary.sentiment_distribution)||{};
    pos+=s['正面']||0; neu+=s['中性']||0; neg+=s['负面']||0;
    Object.keys((entry.data.summary&&entry.data.summary.by_platform)||{}).forEach(function(k){byP[k]=(byP[k]||0)+(entry.data.summary.by_platform[k]||0);});
  });
  items.sort(function(a,b){var o={'负面':0,'中性':1,'正面':2};return(o[a.sentiment]||3)-(o[b.sentiment]||3);});
  return {items:items,summ:{total:items.length,sentiment_distribution:{'正面':pos,'中性':neu,'负面':neg},by_platform:byP}};
}

function renderNegBanner(items){
  var negs=items.filter(function(i){return i.sentiment==='负面';}); var el=document.getElementById('negBanner'); if(!el||!negs.length)return;
  el.classList.add('show');
  var html='<div class="neg-banner-title">⚠️ 负面舆情预警（'+negs.length+'条）</div><ul class="neg-banner-list">';
  negs.slice(0,5).forEach(function(i){html+='<li>▸ <a href="'+(i.url||'#')+'" target="_blank">'+i.title+'</a> <span style="color:#9ca3af">— '+(i.platform_tag||i.platform||'')+'</span></li>';});
  el.innerHTML=html+'</ul>';
}
function renderNegBannerAgg(agg){ renderNegBanner(agg.items); }
function renderStats(summ,items,label){
  var cnt=Array.isArray(items)?items.length:(summ&&summ.total||0);
  var s=(summ&&summ.sentiment_distribution)||{}; var el=document.getElementById('statsRow'); if(!el)return;
  el.innerHTML='<div class="stat-c"><div class="stat-lbl">总曝光量</div><div class="stat-val c-blue">'+cnt+'</div><div class="stat-sub">'+(label||'')+'</div></div>'+
    '<div class="stat-c"><div class="stat-lbl">✅ 正面</div><div class="stat-val c-green">'+(s['正面']||0)+'</div><div class="stat-sub">积极报道</div></div>'+
    '<div class="stat-c"><div class="stat-lbl">⬜ 中性</div><div class="stat-val c-gray">'+(s['中性']||0)+'</div><div class="stat-sub">客观报道</div></div>'+
    '<div class="stat-c"><div class="stat-lbl">❌ 负面</div><div class="stat-val c-red">'+(s['负面']||0)+'</div><div class="stat-sub">需关注</div></div>'+
    '<div class="stat-c"><div class="stat-lbl">📊 来源</div><div class="stat-val c-amber">'+Object.keys((summ&&summ.by_platform)||{}).length+'</div><div class="stat-sub">个平台</div></div>';
}
function renderSentChart(summ){
  var s=(summ&&summ.sentiment_distribution)||{}; var ctx=document.getElementById('cSent'); if(!ctx)return; destroyChart('cSent');
  charts['cSent']=new Chart(ctx,{type:'doughnut',data:{labels:['正面','中性','负面'],datasets:[{data:[s['正面']||0,s['中性']||0,s['负面']||0],backgroundColor:['#16a34a','#9ca3af','#dc2626'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:8}}}}});
}
function renderPlatChart(summ){
  var bp=(summ&&summ.by_platform)||{}; var ctx=document.getElementById('cPlat'); if(!ctx)return; destroyChart('cPlat');
  var labels=Object.keys(bp).slice(0,10);
  charts['cPlat']=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:labels.map(function(k){return bp[k];}),backgroundColor:labels.map(function(l){return platColor(l);}),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:35}},y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}
function renderWeekTrendChart(days){
  var ctx=document.getElementById('cTrend'); if(!ctx)return; destroyChart('cTrend');
  var labels=days.map(function(d){return d.slice(5);});
  var posD=days.map(function(d){var e=findEntry(d);return e&&e.data.summary&&e.data.summary.sentiment_distribution?(e.data.summary.sentiment_distribution['正面']||0):0;});
  var neuD=days.map(function(d){var e=findEntry(d);return e&&e.data.summary&&e.data.summary.sentiment_distribution?(e.data.summary.sentiment_distribution['中性']||0):0;});
  var negD=days.map(function(d){var e=findEntry(d);return e&&e.data.summary&&e.data.summary.sentiment_distribution?(e.data.summary.sentiment_distribution['负面']||0):0;});
  charts['cTrend']=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'正面',data:posD,backgroundColor:'#16a34a',borderRadius:3},{label:'中性',data:neuD,backgroundColor:'#9ca3af',borderRadius:3},{label:'负面',data:negD,backgroundColor:'#dc2626',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{stacked:true,ticks:{font:{size:9}}},y:{stacked:true,beginAtZero:true}}}});
}
function renderMonthTrendChart(days,dataMap){
  var ctx=document.getElementById('cTrend'); if(!ctx)return; destroyChart('cTrend');
  var labels=days.map(function(d){return parseInt(d.slice(8))+'日';});
  var totals=days.map(function(d){return dataMap[d]?(dataMap[d].items||[]).length:0;});
  charts['cTrend']=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'条数',data:totals,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.3,fill:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:8},maxTicksLimit:15,maxRotation:0}},y:{beginAtZero:true}}}});
}
function renderSummaryDesc(text,title,targetId){
  var el=document.getElementById(targetId); if(!el||!text)return;
  el.innerHTML='<div class="summary-c"><div class="summary-ttl">'+title+'</div><div class="summary-body">'+text+'</div></div>';
}
function renderFilters(){
  var el=document.getElementById('filterBar'); if(!el)return;
  var src=['all','官方','央媒','科技媒体','财经媒体','社交','自媒体','国际媒体','媒体'];
  var sent=['all','正面','中性','负面'];
  var sentLabel={'all':'全部','正面':'✅ 正面','中性':'⬜ 中性','负面':'❌ 负面'};
  var html='<span class="f-lbl">来源：</span><div class="f-group">';
  src.forEach(function(t){html+='<button class="f-btn'+(typeFilter===t?' on':'')+'" onclick="setTF(\''+t+'\')">'+(t==='all'?'全部':t)+'</button>';});
  html+='</div><div class="f-sep"></div><span class="f-lbl">情感：</span><div class="f-group">';
  sent.forEach(function(s){html+='<button class="f-btn'+(sentFilter===s?' on':'')+'" onclick="setSF(\''+s+'\')">'+(sentLabel[s]||s)+'</button>';});
  html+='</div>';
  el.innerHTML=html;
}
function renderItems(allItems){
  var filtered=allItems.filter(function(it){return(typeFilter==='all'||it.media_type===typeFilter)&&(sentFilter==='all'||it.sentiment===sentFilter);});
  var cnt=document.getElementById('listCnt'); if(cnt)cnt.textContent='共 '+filtered.length+' 条';
  var wrap=document.getElementById('itemsWrap'); if(!wrap)return;
  if(!filtered.length){wrap.innerHTML='<div class="empty">暂无符合条件的内容</div>';return;}
  var sentCls={'正面':'pos','中性':'neu','负面':'neg'};
  var sentBadge={'正面':'b-sent-pos','中性':'b-sent-neu','负面':'b-sent-neg'};
  var html='<div class="items">';
  filtered.forEach(function(it){
    var cls=sentCls[it.sentiment]||'neu', sb=sentBadge[it.sentiment]||'b-sent-neu';
    var ptag=it.platform_tag||it.platform||'媒体', pcolor=platColor(ptag);
    var hasUrl=it.url&&it.url!=='#';
    var topics=(it.key_topics||[]).map(function(t){return '<span class="topic">'+t+'</span>';}).join('');
    html+='<div class="item '+cls+'"><div class="item-top">';
    html+=hasUrl?'<a class="item-title" href="'+it.url+'" target="_blank" rel="noopener">'+(it.title||'无标题')+'</a>':'<span class="item-title no-link">'+(it.title||'无标题')+'</span>';
    html+='<div class="badges"><span class="badge b-platform" style="background:'+pcolor+'">'+ptag+'</span><span class="badge '+sb+'">'+(it.sentiment||'中性')+'</span><span class="badge b-type">'+(it.content_type||'报道')+'</span></div>';
    html+='</div><div class="item-meta">📅 '+(it.publish_date||'—')+' &nbsp;·&nbsp; ✍️ '+(it.author||it.source||'—')+' &nbsp;·&nbsp; 🏷 '+(it.media_type||it.platform||'媒体')+'</div>';
    html+='<div class="item-summary">'+(it.summary||'暂无摘要')+'</div>';
    if(topics) html+='<div class="item-topics">'+topics+'</div>';
    if(hasUrl) html+='<div class="item-link-row"><a class="item-link" href="'+it.url+'" target="_blank" rel="noopener">🔗 查看原文</a></div>';
    html+='</div>';
  });
  wrap.innerHTML=html+'</div>';
}
function setTF(v){typeFilter=v;renderFilters();renderCurrentItems();}
function setSF(v){sentFilter=v;renderFilters();renderCurrentItems();}
function renderCurrentItems(){
  if(period==='day'){var entry=findEntry(cursor);var its=(entry?entry.data.items||[]:[]).slice().sort(function(a,b){var o={'负面':0,'中性':1,'正面':2};return(o[a.sentiment]||3)-(o[b.sentiment]||3);});renderItems(its);}
  else{var base=new Date(cursor+'T00:00:00');var y=base.getFullYear(),m=base.getMonth();var days=period==='week'?function(){var ws2=weekStart(cursor);var d2=[];for(var i2=0;i2<7;i2++)d2.push(offsetDate(ws2,i2));return d2;}():function(){var nd=new Date(y,m+1,0).getDate();var d3=[];for(var i3=1;i3<=nd;i3++)d3.push(fmtDate(new Date(y,m,i3)));return d3;}();renderItems(aggregateDays(days).items);}
}
function autoWeeklySummary(agg,days){
  var cnt=agg.items.length; if(!cnt)return '本周暂无监测数据。';
  var s=agg.summ.sentiment_distribution||{};
  return '本周（'+days[0]+' 至 '+days[6]+'）共监测到 '+cnt+' 条舆情。正面 '+(s['正面']||0)+' 条、中性 '+(s['中性']||0)+' 条、负面 '+(s['负面']||0)+' 条。'+((s['负面']||0)>0?'⚠️ 本周存在负面舆情，建议重点关注。':'本周整体态势良好。');
}
function autoMonthlySummary(agg,label){
  var cnt=agg.items.length; if(!cnt)return label+'暂无监测数据。';
  var s=agg.summ.sentiment_distribution||{}; var t=(s['正面']||0)+(s['中性']||0)+(s['负面']||0);
  var pr=t?Math.round((s['正面']||0)/t*100):0;
  return label+'共监测到 '+cnt+' 条舆情。正面 '+(s['正面']||0)+'（'+pr+'%）、中性 '+(s['中性']||0)+'、负面 '+(s['负面']||0)+'。'+((s['负面']||0)>0?'本月出现 '+(s['负面']||0)+' 条负面，建议逐一复查跟进。':'本月整体健康，正面比例较高。');
}
function destroyChart(id){if(charts[id]){try{charts[id].destroy();}catch(e){}delete charts[id];}}
function destroyCharts(){Object.keys(charts).forEach(function(k){destroyChart(k);});charts={};}

window.addEventListener('DOMContentLoaded', function() {
  var ta = document.getElementById('urlTextarea');
  if (ta) ta.addEventListener('input', onUrlInput);
});

init();
</script>
